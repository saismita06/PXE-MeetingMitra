<!-- Single adaptive top header.
     In list view: shows PXE MeetingMitra logo + name.
     In recording-detail view: title + inline meta + recording action
     icons take that slot, so the separate detail header is no longer
     needed (it used to add ~72px of vertical chrome). -->
<header class="bg-[var(--bg-secondary)] border-b border-[var(--border-primary)] px-3 sm:px-4 py-2 flex items-center justify-between flex-shrink-0 z-50 gap-3" style="min-height: 56px;">
    <!-- Left side: Menu toggle + (logo OR recording title+meta+actions) -->
    <div class="flex items-center gap-2 sm:gap-3 min-w-0 flex-1">
        <!-- Menu Toggle Button -->
        <button @click="toggleSidebar"
                class="btn btn--icon flex-shrink-0"
                :title="isSidebarCollapsed ? 'Show sidebar' : 'Hide sidebar'">
            <i class="fas fa-bars text-lg"></i>
        </button>

        <!-- LIST VIEW (or any non-detail screen): PXE MeetingMitra logo + name -->
        <div v-if="currentView !== 'detail' || !selectedRecording"
             class="flex items-center gap-2 sm:gap-3 min-w-0">
            <img src="{{ url_for('static', filename='img/icon-32x32.png') }}" alt="PXE MeetingMitra" class="app-logo w-7 h-7 sm:w-8 sm:h-8 flex-shrink-0">
            <h1 class="text-lg sm:text-xl font-bold text-[var(--text-primary)] truncate">PXE MeetingMitra</h1>
        </div>

        <!-- DETAIL VIEW: recording title + inline meta + action icons.
             Replaces the separate desktop-header.html for desktop.
             On narrower screens (mobile) we still rely on mobile-header.html
             below the global header for full metadata. -->
        <template v-else>
            <!-- Recording title. The wrapper uses flex-1 + min-w-0 so
                 the title (h1 or input) can take all remaining
                 horizontal space in the header row; the previous
                 flex-shrink without flex-grow sized the wrapper to
                 content, which made the input collapse to a few dozen
                 pixels in edit mode. -->
            <div class="flex items-center gap-2 min-w-0 flex-1">
                <a href="/" class="flex-shrink-0 hidden sm:block" :title="'Back to PXE MeetingMitra'">
                    <img src="{{ url_for('static', filename='img/icon-32x32.png') }}" alt="PXE MeetingMitra" class="app-logo w-7 h-7">
                </a>
                <h1 v-if="!editingTitle"
                    @dblclick="selectedRecording.can_edit !== false ? toggleEditTitle() : null"
                    :class="[
                        'text-base sm:text-lg font-semibold truncate transition-opacity min-w-0',
                        selectedRecording.is_shared ? 'text-[var(--text-accent)]' : 'text-[var(--text-primary)]',
                        selectedRecording.can_edit !== false ? 'cursor-text hover:opacity-80' : ''
                    ]"
                    :title="selectedRecording.title || 'Untitled Recording'">
                    ${selectedRecording.title || 'Untitled Recording'}
                </h1>
                <input v-else
                       v-model="selectedRecording.title"
                       @blur="saveTitle"
                       @keyup.enter="saveTitle"
                       @keyup.esc="cancelEditTitle"
                       ref="titleInput"
                       class="text-base sm:text-lg font-semibold bg-transparent border-b border-[var(--border-focus)] focus:outline-none text-[var(--text-primary)] flex-1 px-1 min-w-0"
                       placeholder="Untitled Recording">
                <button v-if="!editingTitle && selectedRecording.can_edit !== false"
                        @click="toggleEditTitle"
                        class="btn btn--icon btn--sm flex-shrink-0"
                        :title="t('tooltips.editTitle')">
                    <i class="fas fa-pen text-xs"></i>
                </button>
                <!-- Regenerate title (AI). Shown only for completed
                     recordings, hidden while editing. Re-added per
                     queue item #4 — was lost when the bespoke
                     desktop-header.html merged into this adaptive
                     header. -->
                <button v-if="!editingTitle && selectedRecording.can_edit !== false && selectedRecording.status === 'COMPLETED'"
                        @click="regenerateTitle"
                        :disabled="regeneratingTitle"
                        class="btn btn--icon btn--sm flex-shrink-0"
                        :title="t('tooltips.regenerateTitle')">
                    <i class="fas fa-sync-alt text-xs" :class="{ 'fa-spin': regeneratingTitle }"></i>
                </button>
                <!-- Status badge for non-completed recordings -->
                <span v-if="!editingTitle && selectedRecording.status !== 'COMPLETED'"
                      :class="getStatusClass(selectedRecording.status)"
                      class="inline-flex items-center px-2 py-0.5 text-xs font-medium rounded-full whitespace-nowrap flex-shrink-0">
                    ${formatStatus(selectedRecording.status)}
                </span>
            </div>
        </template>
    </div>

    <!-- Right side: detail-view action icons (when applicable) +
         token budget + new recording + user menu -->
    <div class="flex items-center gap-1 sm:gap-2 flex-shrink-0">
        <!-- DETAIL VIEW: action icons inline in the header bar. Hidden
             on narrow screens; mobile-header.html surfaces them in the
             expanded meta panel. -->
        <template v-if="currentView === 'detail' && selectedRecording && !selectedRecording.incognito">
            <!-- Assign-folder dropdown. A custom themed menu, not a raw
                 <select> (whose OS-rendered option list ignored the app
                 theme — looked out of place against the dark UI). -->
            <div v-if="foldersEnabled && selectedRecording.can_edit !== false" class="relative hidden md:inline-flex">
                <button @click.stop="showHeaderFolderMenu = !showHeaderFolderMenu"
                        data-header-folder-toggle
                        class="btn btn--icon"
                        :title="selectedRecording.folder_id ? getFolderName(selectedRecording.folder_id) : t('tooltips.assignFolder')">
                    <i class="fas fa-folder"
                       :style="{ color: selectedRecording.folder_id ? getFolderColor(selectedRecording.folder_id) : '' }"></i>
                </button>
                <div v-if="showHeaderFolderMenu"
                     data-header-folder-dropdown
                     class="absolute left-0 mt-2 min-w-[12rem] max-h-72 overflow-y-auto surface-raised z-50 py-1">
                    <button @click="assignFolderToRecording(selectedRecording.id, null); showHeaderFolderMenu = false"
                            class="w-full flex items-center gap-2 px-3 py-2 text-left text-sm hover:bg-[var(--bg-tertiary)] transition-colors"
                            :class="!selectedRecording.folder_id ? 'text-[var(--text-accent)] font-medium' : ''">
                        <i class="fas fa-ban w-4 text-center text-[var(--text-muted)]"></i>
                        <span class="flex-1 truncate">${ t('folderManagement.noFolder') }</span>
                        <i v-if="!selectedRecording.folder_id" class="fas fa-check text-xs text-[var(--text-accent)]"></i>
                    </button>
                    <button v-for="folder in availableFolders" :key="folder.id"
                            @click="assignFolderToRecording(selectedRecording.id, folder.id); showHeaderFolderMenu = false"
                            class="w-full flex items-center gap-2 px-3 py-2 text-left text-sm hover:bg-[var(--bg-tertiary)] transition-colors"
                            :class="selectedRecording.folder_id == folder.id ? 'font-medium' : ''">
                        <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" :style="{ backgroundColor: getFolderColor(folder.id) }"></span>
                        <span class="flex-1 truncate">${ folder.name }</span>
                        <i v-if="selectedRecording.folder_id == folder.id" class="fas fa-check text-xs text-[var(--text-accent)]"></i>
                    </button>
                </div>
            </div>
            <button @click="toggleInbox(selectedRecording)" class="btn btn--icon hidden md:inline-flex"
                    :style="selectedRecording.is_inbox ? 'color: #3b82f6;' : ''"
                    :title="selectedRecording.is_inbox ? 'Mark as Read' : 'Move to Inbox'">
                <i class="fas fa-inbox"></i>
            </button>
            <button @click="toggleHighlight(selectedRecording)" class="btn btn--icon hidden md:inline-flex"
                    :style="selectedRecording.is_highlighted ? 'color: #eab308;' : ''"
                    :title="selectedRecording.is_highlighted ? 'Remove Highlight' : 'Highlight'">
                <i class="fas fa-star"></i>
            </button>
            <button @click="editRecordingTags(selectedRecording)" class="btn btn--icon hidden md:inline-flex"
                    :title="t('buttons.editTags')">
                <i class="fas fa-tags"></i>
            </button>
            <button @click="confirmReprocess('transcription', selectedRecording)"
                    v-if="selectedRecording && selectedRecording.can_edit !== false && (selectedRecording.status === 'COMPLETED' || selectedRecording.status === 'FAILED')"
                    class="btn btn--icon hidden lg:inline-flex"
                    :title="useAsrEndpoint ? 'Reprocess with ASR' : 'Reprocess transcription'">
                <i class="fas fa-redo-alt"></i>
            </button>
            <button @click="confirmReprocess('summary', selectedRecording)"
                    v-if="selectedRecording && selectedRecording.can_edit !== false && (selectedRecording.status === 'COMPLETED' || selectedRecording.status === 'FAILED')"
                    class="btn btn--icon hidden lg:inline-flex"
                    :title="t('buttons.reprocessSummary')">
                <i class="fas fa-sync-alt"></i>
            </button>
            <button @click="confirmReset(selectedRecording)" v-if="['PENDING', 'PROCESSING', 'SUMMARIZING', 'FAILED'].includes(selectedRecording.status)"
                    class="btn btn--icon hidden md:inline-flex" style="color: rgb(249, 115, 22);"
                    :title="t('buttons.resetStuckProcessing')">
                <i class="fas fa-undo"></i>
            </button>
            <button @click="openSpeakerModal" v-if="processedTranscription.hasDialogue"
                    class="btn btn--icon hidden lg:inline-flex"
                    :title="t('buttons.identifySpeakers')">
                <i class="fas fa-user-tag"></i>
            </button>
            <button v-if="!selectedRecording.is_shared || (selectedRecording.share_info && selectedRecording.share_info.can_reshare)"
                    @click="openUnifiedShareModal(selectedRecording)"
                    class="btn btn--icon hidden md:inline-flex"
                    :title="t('buttons.shareRecording')">
                <i class="fas fa-share-alt"></i>
            </button>
            <button v-if="canDeleteRecordings && selectedRecording.can_delete !== false" @click="confirmDelete(selectedRecording)"
                    class="btn btn--icon hidden md:inline-flex" style="color: var(--text-danger);">
                <i class="fas fa-trash"></i>
            </button>
            <!-- Vertical divider between action icons and global controls -->
            <div class="hidden md:block w-px h-6 bg-[var(--border-primary)] mx-1"></div>
        </template>

        {% include 'components/token_budget_indicator.html' %}

        <!-- Inquire / Install PWA / New Recording header buttons.
             All three use the .btn .btn--sm primitive so their height
             + padding + font size are identical; only the colour
             intent differs (Inquire = quiet/highlighted, PWA Install
             = primary-success, New Recording = primary). -->
        <!-- Inquire Mode Button -->
        {% if inquire_mode_enabled %}
        <a href="/inquire" class="btn btn--sm" style="background: var(--bg-accent); color: var(--text-accent); border-color: transparent;">
            <i class="fas fa-search"></i>
            <span class="hidden sm:inline" v-text="t('inquire.title')"></span>
        </a>
        {% endif %}

        <!-- Install PWA Button -->
        <button v-if="showInstallButton && !isPWAInstalled"
                @click="promptInstall"
                class="btn btn--sm"
                style="background: #16a34a; color: #fff; border-color: transparent;"
                :title="t('pwa.installApp')">
            <i class="fas fa-download"></i>
            <span class="hidden sm:inline" v-text="t('pwa.installApp')"></span>
        </button>

        <!-- New Recording Button -->
        <button @click="switchToUploadView" class="btn btn--sm btn--primary">
            <i class="fas fa-plus"></i><span class="hidden sm:inline" v-text="t('nav.newRecording')"></span>
        </button>

        <!-- User menu -->
        {% if current_user.is_authenticated %}
        <div class="relative">
            <button @click="isUserMenuOpen = !isUserMenuOpen"
                    data-user-menu-toggle
                    class="btn btn--icon"
                    :title="t('admin.userMenu')">
                <i class="fas fa-user-circle text-lg"></i>
            </button>

            <!-- User dropdown -->
            <div v-if="isUserMenuOpen"
                 data-user-menu-dropdown
                 class="absolute right-0 mt-2 w-56 surface-raised z-50">
                <a href="/account" class="block px-4 py-2 hover:bg-[var(--bg-tertiary)] transition-colors">
                    <i class="fas fa-cog mr-2 w-4 text-center"></i><span v-text="t('nav.settings')"></span>
                </a>
                <a href="/account#tags" class="block px-4 py-2 hover:bg-[var(--bg-tertiary)] transition-colors">
                    <i class="fas fa-tags mr-2 w-4 text-center"></i><span v-text="t('help.tagManagement')"></span>
                </a>
                <button @click="openSharesList" class="w-full text-left px-4 py-2 hover:bg-[var(--bg-tertiary)] transition-colors flex items-center">
                    <i class="fas fa-share-alt mr-2 w-4 text-center"></i><span v-text="t('modal.sharedTranscripts')"></span>
                </button>
                {% if current_user.is_admin %}
                <a href="/admin" class="block px-4 py-2 hover:bg-[var(--bg-tertiary)] transition-colors">
                    <i class="fas fa-user-shield mr-2 w-4 text-center"></i>
                    <span v-text="t('admin.title')"></span>
                </a>
                {% elif is_group_admin %}
                <a href="/group-management" class="block px-4 py-2 hover:bg-[var(--bg-tertiary)] transition-colors">
                    <i class="fas fa-users-cog mr-2 w-4 text-center"></i>
                    <span v-text="t('nav.groupManagement')"></span>
                </a>
                {% endif %}
                <div class="border-t border-[var(--border-primary)] my-1"></div>
                <button @click="toggleDarkMode" class="w-full text-left px-4 py-2 hover:bg-[var(--bg-tertiary)] transition-colors flex items-center">
                    <i :class="isDarkMode ? 'fas fa-sun' : 'fas fa-moon'" class="mr-2 w-4 text-center"></i>
                    <span v-text="isDarkMode ? t('nav.lightMode') : t('nav.darkMode')"></span>
                </button>
                <button @click="openColorSchemeModal" class="w-full text-left px-4 py-2 hover:bg-[var(--bg-tertiary)] transition-colors flex items-center">
                    <i class="fas fa-palette mr-2 w-4 text-center"></i>
                    <span v-text="t('modal.colorScheme')"></span>
                </button>
                <div class="border-t border-[var(--border-primary)] my-1"></div>
                <a href="/logout" class="block px-4 py-2 hover:bg-[var(--bg-tertiary)] transition-colors">
                    <i class="fas fa-sign-out-alt mr-2 w-4 text-center"></i><span v-text="t('nav.signOut')"></span>
                </a>
            </div>
        </div>
        {% endif %}
    </div>
</header>
