<!-- Simple Transcription Editor Modal (design system v1) -->
<div v-if="showTextEditorModal" @click.self="closeTextEditorModal" class="modal-overlay">
    <div class="modal-panel modal-panel--lg">
        <div class="modal-header">
            <h3 class="modal-title" v-text="t('modal.editTranscription')"></h3>
            <button @click="closeTextEditorModal" class="modal-close" :title="t('buttons.close')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div>
                <label class="block text-sm font-medium mb-2" v-text="t('transcription.title')"></label>
                <textarea v-model="editingTranscriptionContent" rows="15" class="field font-mono" style="min-height: 320px;"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button @click="closeTextEditorModal" class="btn btn--ghost">${ t('buttons.cancel') }</button>
            <button @click="saveTranscription" class="btn btn--primary">${ t('buttons.save') || 'Save Changes' }</button>
        </div>
    </div>
</div>
