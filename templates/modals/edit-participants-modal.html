<!-- Edit Participants Modal (design system v1) -->
<div v-if="showEditParticipantsModal" @click.self="closeEditParticipantsModal" class="modal-overlay">
    <div @click="closeAllParticipantSuggestions" class="modal-panel modal-panel--sm">
        <div class="modal-header">
            <h3 class="modal-title" v-text="t('modal.editParticipants')"></h3>
            <button @click="closeEditParticipantsModal" class="modal-close" :title="t('buttons.close')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" @scroll="closeAllParticipantSuggestions">
            <p class="t-meta mb-3">Manage participants for this recording.</p>
            <div class="space-y-2">
                <div v-for="(participant, index) in editingParticipantsList" :key="index" class="relative">
                    <div class="flex items-center gap-2">
                        <div class="flex-1 relative" @click.stop>
                            <input v-model="participant.name"
                                   @input="filterParticipantSuggestions(index)"
                                   @focus="filterParticipantSuggestions(index)"
                                   @blur="closeParticipantSuggestionsDelayed(index)"
                                   :data-participant-index="index"
                                   type="text" class="field" placeholder="Participant name...">
                        </div>
                        <teleport to="body">
                            <div v-if="editingParticipantSuggestions[index]?.length > 0"
                                 class="fixed z-[100] surface-raised max-h-32 overflow-y-auto"
                                 :style="getParticipantDropdownPosition(index)">
                                <button v-for="suggestion in editingParticipantSuggestions[index]" :key="suggestion"
                                        @mousedown="selectParticipantSuggestion(index, suggestion)"
                                        class="w-full px-3 py-2 text-left hover:bg-[var(--bg-tertiary)] transition-colors text-sm">
                                    ${suggestion}
                                </button>
                            </div>
                        </teleport>
                        <button @click="removeParticipant(index)" class="btn btn--icon btn--sm" style="color: var(--text-muted);">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>
            <button @click="addParticipant"
                    class="mt-3 w-full py-2 border border-dashed border-[var(--border-primary)] rounded-md text-sm text-[var(--text-muted)] hover:border-[var(--text-accent)] hover:text-[var(--text-accent)] transition-colors">
                <i class="fas fa-plus mr-2"></i>Add Participant
            </button>
        </div>
        <div class="modal-footer">
            <button @click="closeEditParticipantsModal" class="btn btn--ghost">${ t('buttons.cancel') }</button>
            <button @click="saveParticipants" class="btn btn--primary">${ t('buttons.save') || 'Save Changes' }</button>
        </div>
    </div>
</div>
