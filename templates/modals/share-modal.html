<!-- Share Modal (design system v1) -->
<div v-if="showShareModal" @click.self="closeShareModal" class="modal-overlay">
    <div class="modal-panel modal-panel--lg">
        <div class="modal-header">
            <h3 class="modal-title" v-text="t('modal.shareRecording')"></h3>
            <button @click="closeShareModal" class="modal-close" :title="t('buttons.close')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body space-y-3">
            <p class="t-meta" v-text="t('help.createPublicLink')"></p>

            <div class="flex items-center gap-3">
                <label class="flex items-center">
                    <input type="checkbox" v-model="shareOptions.share_summary" id="share_summary" class="h-4 w-4 rounded">
                    <span class="ml-2 text-xs" v-text="t('form.shareSummary')"></span>
                </label>
                <label class="flex items-center">
                    <input type="checkbox" v-model="shareOptions.share_notes" id="share_notes" class="h-4 w-4 rounded">
                    <span class="ml-2 text-xs" v-text="t('form.shareNotes')"></span>
                </label>
            </div>

            <button @click="createShare(true)" class="btn btn--primary w-full">
                <i class="fas fa-plus-circle"></i>
                <span>Create New Share Link</span>
            </button>

            <div v-if="isLoadingPublicShares" class="empty">
                <div class="spinner spinner--lg"></div>
                <div class="t-meta">Loading share links...</div>
            </div>

            <div v-else-if="recordingPublicShares.length > 0" class="space-y-2">
                <h4 class="t-label">Existing Share Links (${recordingPublicShares.length})</h4>
                <div v-for="share in recordingPublicShares" :key="share.id" class="bg-[var(--bg-tertiary)] p-3 rounded-md border border-[var(--border-primary)]">
                    <div class="flex justify-between items-start mb-2">
                        <p class="t-meta">${ t('help.sharedOn') }: ${ formatShareDate(share.created_at) }</p>
                        <button @click="confirmDeletePublicShare(share)" class="btn btn--icon btn--sm" style="color: var(--text-danger);">
                            <i class="fas fa-trash text-xs"></i>
                        </button>
                    </div>
                    <div class="flex items-center gap-3 mb-2">
                        <label class="flex items-center text-xs">
                            <input type="checkbox" v-model="share.share_summary" @change="updateShare(share)" class="h-3.5 w-3.5 rounded">
                            <span class="ml-1.5" v-text="t('form.shareSummary')"></span>
                        </label>
                        <label class="flex items-center text-xs">
                            <input type="checkbox" v-model="share.share_notes" @change="updateShare(share)" class="h-3.5 w-3.5 rounded">
                            <span class="ml-1.5" v-text="t('form.shareNotes')"></span>
                        </label>
                    </div>
                    <div class="relative">
                        <input :value="share.share_url" :id="'share-link-' + share.id" readonly class="field pr-10 font-mono" style="font-size: 11px;">
                        <button @click="copyPublicShareLinkWithFeedback(share.share_url, share.id)"
                                class="absolute right-1 top-1/2 -translate-y-1/2 btn btn--sm btn--primary btn--icon"
                                :title="t('buttons.copy')">
                            <i :class="copiedShareId === share.id ? 'fas fa-check' : 'fas fa-copy'"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div v-else-if="!isLoadingPublicShares" class="empty">
                <div class="empty__icon"><i class="fas fa-link"></i></div>
                <div class="empty__title" v-text="t('sharedTranscripts.noSharedTranscripts')"></div>
                <div class="empty__body">Click the button above to create one</div>
            </div>
        </div>
        <div class="modal-footer">
            <button @click="closeShareModal" class="btn btn--primary">Done</button>
        </div>
    </div>
</div>
