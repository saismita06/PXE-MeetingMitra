<!-- Customise Summary Prompt Modal (design system v1) -->
<div v-if="showCustomizeSummaryModal" @click.self="closeCustomizeSummaryModal" class="modal-overlay">
    <div class="modal-panel modal-panel--lg">
        <div class="modal-header">
            <i class="fas fa-magic text-2xl text-[var(--text-accent)]"></i>
            <h3 class="modal-title">${ t('customizeSummary.title') }</h3>
            <button @click="closeCustomizeSummaryModal" class="modal-close" :title="t('buttons.close')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body space-y-4">
            <p class="t-meta">${ t('customizeSummary.body') }</p>

            <div class="grid grid-cols-2 gap-2 p-1 bg-[var(--bg-tertiary)] border border-[var(--border-primary)] rounded-md">
                <label :class="['flex items-start gap-2 p-3 rounded-sm cursor-pointer transition-colors',
                                customizeSummaryMode === 'append' ? 'bg-[var(--bg-secondary)] ring-1 ring-[var(--border-accent)]' : 'hover:bg-[var(--bg-secondary)]']">
                    <input type="radio" value="append" v-model="customizeSummaryMode" class="mt-1 h-4 w-4">
                    <span class="flex-1">
                        <span class="block t-body-strong">${ t('summaryMode.append') }</span>
                        <span class="block t-meta mt-0.5">${ t('summaryMode.appendHelp') }</span>
                    </span>
                </label>
                <label :class="['flex items-start gap-2 p-3 rounded-sm cursor-pointer transition-colors',
                                customizeSummaryMode === 'replace' ? 'bg-[var(--bg-secondary)] ring-1 ring-[var(--border-accent)]' : 'hover:bg-[var(--bg-secondary)]']">
                    <input type="radio" value="replace" v-model="customizeSummaryMode" class="mt-1 h-4 w-4">
                    <span class="flex-1">
                        <span class="block t-body-strong">${ t('summaryMode.replace') }</span>
                        <span class="block t-meta mt-0.5">${ t('summaryMode.replaceHelp') }</span>
                    </span>
                </label>
            </div>

            <div>
                <label class="block t-label mb-2">
                    <span v-if="customizeSummaryMode === 'append'">${ t('customizeSummary.additionalContext') }</span>
                    <span v-else>${ t('customizeSummary.customPrompt') }</span>
                </label>
                <textarea v-model="customizeSummaryPrompt" rows="10"
                          :placeholder="customizeSummaryMode === 'append' ? t('customizeSummary.appendPlaceholder') : t('customizeSummary.replacePlaceholder')"
                          class="field font-mono" style="resize: vertical; min-height: 240px;"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button @click="closeCustomizeSummaryModal" class="btn btn--ghost">${ t('buttons.cancel') }</button>
            <button @click="submitCustomizeSummaryModal" :disabled="!customizeSummaryPrompt.trim()" class="btn btn--primary">
                <i class="fas fa-magic"></i>
                <span>${ t('customizeSummary.generateSummary') }</span>
            </button>
        </div>
    </div>
</div>
