<!-- Upload Disclaimer Modal (design system v1) -->
<div v-if="showUploadDisclaimerModal" @click.self="cancelUploadDisclaimer" class="modal-overlay">
    <div class="modal-panel modal-panel--lg">
        <div class="modal-header">
            <i class="fas fa-info-circle text-2xl text-[var(--text-accent)]"></i>
            <h3 class="modal-title" v-text="t('modal.uploadNotice')"></h3>
            <button @click="cancelUploadDisclaimer" class="modal-close" :title="t('buttons.close')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="prose-flush" v-html="uploadDisclaimerHtml"></div>
        </div>
        <div class="modal-footer">
            <button @click="cancelUploadDisclaimer" class="btn btn--ghost">${ t('buttons.cancel') }</button>
            <button @click="acceptUploadDisclaimer" class="btn btn--primary">
                <i class="fas fa-upload"></i>
                <span v-text="t('modal.uploadFiles')"></span>
            </button>
        </div>
    </div>
</div>
