<!-- Edit Recording Modal (design system v1) -->
<div v-if="showEditModal" @click.self="cancelEdit" class="modal-overlay">
    <div class="modal-panel modal-panel--md">
        <div class="modal-header">
            <h3 class="modal-title" v-text="t('modal.editRecording')"></h3>
            <button @click="cancelEdit" class="modal-close" :title="t('buttons.close')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2" v-text="t('form.title')"></label>
                <input v-model="editingRecording.title" class="field">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2" v-text="t('form.participants')"></label>
                <input v-model="editingRecording.participants" class="field">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2" v-text="t('form.meetingDate')"></label>
                <div @click="openDateTimePicker('edit_modal_meeting_date', editingRecording.meeting_date, (isoString) => { editingRecording.meeting_date = isoString; })"
                     class="field cursor-pointer hover:border-[var(--border-focus)] flex items-center justify-between">
                    <span :class="editingRecording.meeting_date ? 'text-[var(--text-primary)]' : 'text-[var(--text-muted)]'">
                        ${editingRecording.meeting_date ? formatDisplayDate(editingRecording.meeting_date, true) : 'Select date and time...'}
                    </span>
                    <i class="fas fa-calendar-alt text-[var(--text-muted)]"></i>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium mb-2" v-text="t('form.notes')"></label>
                <textarea v-model="editingRecording.notes" rows="4" class="field" style="min-height: 96px;"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button @click="cancelEdit" class="btn btn--ghost">${ t('buttons.cancel') }</button>
            <button @click="saveEdit" class="btn btn--primary">${ t('buttons.save') || 'Save Changes' }</button>
        </div>
    </div>
</div>
