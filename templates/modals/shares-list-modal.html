<!-- Shares List Modal (design system v1) -->
<div v-if="showSharesListModal" @click.self="closeSharesList" class="modal-overlay">
    <div class="modal-panel modal-panel--lg">
        <div class="modal-header">
            <h3 class="modal-title" v-text="t('modal.sharedTranscripts')"></h3>
            <button @click="closeSharesList" class="modal-close" :title="t('buttons.close')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div v-if="isLoadingShares" class="empty">
                <div class="spinner spinner--lg"></div>
            </div>
            <div v-else-if="userShares.length === 0" class="empty">
                <div class="empty__icon"><i class="fas fa-share-alt"></i></div>
                <div class="empty__title" v-text="t('sharedTranscripts.noSharedTranscripts')"></div>
            </div>
            <div v-else class="space-y-3">
                <div v-for="share in userShares" :key="share.id"
                     class="p-4 rounded-md border border-[var(--border-primary)] bg-[var(--bg-tertiary)]">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="t-body-strong">${share.recording_title}</p>
                            <p class="t-meta">${ t('help.sharedOn') }: ${ formatShareDate(share.created_at) }</p>
                        </div>
                        <button @click="confirmDeleteShare(share)" class="btn btn--icon btn--sm" style="color: var(--text-danger);"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="mt-3 flex items-center gap-4">
                        <label class="flex items-center text-sm">
                            <input type="checkbox" v-model="share.share_summary" @change="updateShare(share)" class="h-4 w-4 rounded">
                            <span class="ml-2" v-text="t('form.shareSummary')"></span>
                        </label>
                        <label class="flex items-center text-sm">
                            <input type="checkbox" v-model="share.share_notes" @change="updateShare(share)" class="h-4 w-4 rounded">
                            <span class="ml-2" v-text="t('form.shareNotes')"></span>
                        </label>
                    </div>
                    <div class="mt-3 relative">
                        <input :value="'{{ request.url_root }}share/' + share.public_id" :id="'share-link-' + share.id" readonly class="field pr-12">
                        <button @click="copyIndividualShareLink(share.id)"
                                class="absolute right-1.5 top-1/2 -translate-y-1/2 btn btn--sm btn--primary btn--icon"
                                :title="t('buttons.copy')">
                            <i :class="copiedShareId === share.id ? 'fas fa-check' : 'fas fa-copy'"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
