name: Publish to Docker Hub

# Publish step, kept separate from CI. The "Tests" workflow runs on every
# push/PR; this one does NOT run on ordinary pushes. It publishes when you
# create a version tag (deliberate "cut a release" act) and can also be run by
# hand from the Actions tab. Building/pushing the multi-arch images needs the
# DOCKERHUB_USERNAME / DOCKERHUB_TOKEN repo secrets.
#
#   git tag v0.6.0 && git push forgejo v0.6.0   ->   publishes :v0.6.0
#
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish (manual runs only; tag pushes use the git tag)"
        required: false
        default: latest

env:
  REGISTRY: docker.io
  IMAGE_NAME: learnedmachine/speakr
  # Manual run -> the input; tag push -> the git tag name (e.g. v0.6.0).
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}

jobs:
  # Quick gate so a broken migration never gets published, even if someone runs
  # this against an untested commit. The full suite lives in the Tests workflow.
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: speakr
          POSTGRES_PASSWORD: speakr
          POSTGRES_DB: speakr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U speakr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run static migration compatibility tests
        run: python tests/test_migration_compatibility.py

      - name: Run migrations against PostgreSQL
        env:
          TEST_DATABASE_URI: postgresql://speakr:speakr@postgres:5432/speakr_test
        run: python tests/test_postgres_migrations.py

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # arm64 is built via QEMU emulation (no native arm runner). Slow but works.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          build-args: |
            PRODUCTION=1

  build-lite:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push lite image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-lite
          build-args: |
            PRODUCTION=1
            LIGHTWEIGHT=1
